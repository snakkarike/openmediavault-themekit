version: "1.0"
type: component
data:
  name: themekit-changelog-page
  type: formPage
  config:
    request:
      service: ThemeKit
      get:
        method: get
    fields:
      - type: divider
        title: _("Changelog")
      - type: textarea
        name: changelog_view
        label: _("Release History")
        rows: 50
        value: |
          openmediavault-themekit (1.1.1)

            * Removed branding options to preserve the OpenMediaVault logo.
            * Removed update page and references.

          openmediavault-themekit (1.1.0)

            * Setup new apt installation system to allow apt upgrades to work properly.

          openmediavault-themekit (1.0.9)

            * Set character limits for custom branding text inputs and fixed font-family application.

          openmediavault-themekit (1.0.8)

            * Added Custom Branding section to replace the OpenMediaVault logo with custom text or an external image URL.
            * Implemented Content Security Policy (CSP) bypass by dynamically downloading external branding images locally via Salt during deployment.
            * Added responsive Mobile Logo support to define a separate short-text or square image for screens under 420px.
            * Replaced logo correctly on login, authentication, and standby pages by overriding the `content` CSS property.
            * Added automated GitHub Actions workflow for building and publishing `.deb` releases on version tags.

          openmediavault-themekit (1.0.7)

            * Replaced background exec(omv-salt ...) call in the RPC set method with a proper omv-engined module listener following the standard OpenMediaVault plugin architecture.
            * Added engined/module/themekit.inc implementing ServiceAbstract and IListener, which marks the module dirty via setDirty() on configuration changes.
            * CSS is now only regenerated when the user explicitly clicks Apply Changes, consistent with how all other OMV plugins behave.
            * Optimized RPC set method: cache getAssoc() result once and reuse for both notify() and return value instead of calling it three times.
            * Fixed variable name collision in download_font.py: inner binary download variable renamed to font_binary to avoid shadowing the outer DB lookup variable.
            * Added | string filter to user-custom.css.j2 to prevent Jinja re-evaluation of user-provided CSS content.
            * Added log rotation to download_font.py: log file rotated at 500 KB to prevent unbounded growth.
            * Added explicit return after finish() calls at early-exit points in download_font.py to make control flow unambiguous.
            * Fixed formatting in postinst and postrm scripts.
            * Updated debian/control description to mention typography and custom CSS features.

          openmediavault-themekit (1.0.6)

            * SECURITY: Fixed YAML/Jinja injection vulnerability in Salt states by enforcing JSON serialization (`| json`) for all dynamically injected variables.
            * Fixed persistent 404 error for `theme-font.css` by correctly generating a blank stylesheet when no font is selected or custom typography is disabled.
            * Cleaned up backend RPC by establishing the XML database as the sole source of truth, dropping heavy fallback reads and `syslog()` debug dumps.
            * Added missing schema toggles (`enableTypography` and `enableCustomCss`) to the `confdb` seed script to prevent validation errors on initial plugin load.
            * Removed legacy `xmlstarlet` dependencies from the `postinst` upgrade script to improve reliability on modern OMV versions.
            * SECURITY: Fixed potential CSS injection vulnerability by escaping single and double quotes in custom font names via Jinja before rendering.
            * Fixed performance issue by implementing MD5 hash-based cache-busting for CSS injection in index.html, allowing the browser to cache files when unchanged.
            * Fixed unconditional execution of the font download Salt state by implementing a proper stateful python script that accurately reports changes.
            * Fixed missing datamodel validation for RPC requests by adding a dedicated `rpc.themekit.set` JSON schema and enforcing strict server-side validation on incoming API payloads.
            * Fixed race conditions causing `index.html` corruption by implementing an exclusive `flock` lock around the background Salt state deployments.
            * Improved upgrade reliability by removing unconditional `nginx` and `php-fpm` reloads from the `postinst` script, preventing unnecessary web server restarts.

          openmediavault-themekit (1.0.5)

            * Expanded CSS typography selectors to aggressively apply custom fonts to previously missed Angular Material components (dialogs, checkboxes, selects, and specific headings).
            * Refactored font scaling logic to correctly maintain OMV's native header sizing hierarchy using proportional CSS `calc()` operations based on the user's selected base font size.
            * Added master toggle checkboxes to enable/disable Custom Typography and Custom CSS natively from the UI without losing configured settings.

          openmediavault-themekit (1.0.4)

            * SECURITY: Fixed severe shell injection vulnerability in `download_font.py` by passing dynamic font names via environment variables (`THEMEKIT_ACTIVE_FONT`) instead of shell arguments from Salt.
            * SECURITY: Enforced strict TLS verification for Google Fonts API and font file downloads to prevent MITM attacks.
            * SECURITY: Hardened `download_font.py` against path traversal vulnerabilities by enforcing strict directory bounds checking (`os.path.abspath`) when writing downloaded font files.
            * SECURITY: Moved font download logs from world-writable `/tmp` to dedicated `/var/log/themekit` directory to prevent symlink races.
            * SECURITY: Fully URL-encoded font names (`urllib.parse.quote_plus`) when querying the Google Fonts API.
            * Updated Google Fonts list to include 1900+ fonts (including Geist and Geist Mono) and increased default base font size to 16.
            * Converted changelog view to a readable, tall scrollable text area without a save button.
            * Improved font downloading script to handle updated font database schema.
            * Added python-based database migration script to guarantee custom CSS and fonts load/save properly on upgrades.
            * Fixed redundant breadcrumb trails (System > Theme Kit > Typography) across all navigation tabs.
            * Fixed UI layout by utilizing native divider components for section titles instead of empty paragraphs across all plugin pages.
            * Corrected YAML syntax issues in form definitions preventing successful workbench compilation (omv-mkworkbench).
            * Adjusted base font size validation to allow a more reasonable range (10px to 24px).

          openmediavault-themekit (1.0.3)

            * Restructured Settings page into distinct tabs: Settings, Typography, Custom CSS, Changelog, and Update.
            * Added comprehensive Google Fonts integration (categorized by font style) and base font size configuration.
            * Introduced Custom CSS feature allowing users to inject high-priority CSS overrides directly from the UI.
            * Improved backend deployment by generating user custom CSS dynamically via Salt and injecting into the HTML.
            * Added missing icons for navigation tabs.
            * Fixed font overriding by aggressively targeting OMV typography classes.

          openmediavault-themekit (1.0.2)

            * Added "None (Native OMV)" theme option to disable custom theming entirely.
            * Restored topbar blur on special pages (Login, Authentication, Shutdown, Standby).
            * Styled topbar on special pages with a darker shade of the selected accent color.

          openmediavault-themekit (1.0.1)

            * Replaced global apt hook with precise dpkg trigger on index.html updates.
            * Properly seed theme key on fresh installation.
            * Tightened error handling by halting installation if schema registration fails.
            * Cleaned up remaining metadata and documentation placeholders.

          openmediavault-themekit (1.0.0)

            * Initial stable release of OpenMediaVault Themekit.
            * Added extensive collection of pre-configured themes (Catppuccin, Rose Pine, Gruvbox, Nord, Dracula, etc.).
            * Added dynamic styling engine with fallback variables to ensure uniform UI scaling across custom themes.
            * Fixed contrast issues for dropdowns, popover menus, and sidebar list items in both light and dark modes.
            * Implemented dynamic logo inversion for themes with lighter backgrounds.
            * Corrected active list item backgrounds and icon color inheritances for seamless integration with Angular Material UI.
            * Included Salt deploy modules and APT hooks to guarantee UI state persistence across system updates.
            * Developed Settings page for effortlessly toggling themes and accents.

        modifiers:
          - type: disabled
buttons: []
