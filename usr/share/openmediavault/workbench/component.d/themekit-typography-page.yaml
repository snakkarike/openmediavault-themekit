version: "1.0"
type: component
data:
  name: themekit-typography-page
  type: formPage
  config:
    request:
      service: ThemeKit
      get:
        method: get
      post:
        method: set
    fields:
      - type: divider
        title: _("Fonts")
      - type: select
        name: fontCategory
        label: _("Font Category")
        hint: _("Filter fonts by style/category.")
        value: "all"
        store:
          data:
            - value: "all"
              text: _("All Fonts")
            - value: "sans-serif"
              text: _("Sans Serif")
            - value: "serif"
              text: _("Serif")
            - value: "display"
              text: _("Display")
            - value: "handwriting"
              text: _("Handwriting")
            - value: "monospace"
              text: _("Monospace")
      - type: select
        name: customFont_all
        label: _("Custom Google Font")
        hint: _("Select a font to apply globally across the interface.")
        value: ""
        modifiers:
          - type: hidden
            constraint:
              operator: ne
              arg0:
                prop: fontCategory
              arg1: "all"
